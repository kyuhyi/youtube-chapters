<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 챕터 생성기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        button {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .result-header h2 {
            font-size: 1.3rem;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            font-size: 0.9rem;
            width: auto;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .chapters-output {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.95rem;
            line-height: 1.8;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .video-preview {
            margin-top: 20px;
            text-align: center;
        }

        .video-preview img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .video-title {
            color: #feca57;
            font-weight: 600;
        }

        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .settings-toggle {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 10px;
            width: auto;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .settings-toggle:hover {
            color: #fff;
        }

        .settings-panel {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings-panel.show {
            display: block;
        }

        .bookmarklet-section {
            margin-top: 10px;
            padding: 12px;
            background: rgba(255, 200, 87, 0.1);
            border-radius: 8px;
            border: 1px dashed rgba(255, 200, 87, 0.3);
        }

        .bookmarklet-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(90deg, #feca57, #ff9f43);
            color: #1a1a2e !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .bookmarklet-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(254, 202, 87, 0.4);
        }

        .bookmarklet-btn:active {
            cursor: grabbing;
        }

        .paste-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #feca57;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .paste-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 YouTube 챕터 생성기</h1>
        <p class="subtitle">유튜브 URL을 입력하면 AI가 자동으로 챕터를 만들어줍니다</p>

        <div class="input-section">
            <div class="input-group">
                <label for="youtube-url">YouTube URL</label>
                <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." />
            </div>

            <div class="input-group">
                <label for="api-key">Google Gemini API Key · <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#feca57">키 발급받기</a></label>
                <input type="text" id="api-key" placeholder="AIza..." />
            </div>

            <button class="settings-toggle" onclick="toggleSettings()">
                ⚙️ 고급 설정
            </button>

            <div class="settings-panel show" id="settings-panel">
                <div class="input-group">
                    <label for="chapter-count">챕터 개수 (대략)</label>
                    <input type="text" id="chapter-count" placeholder="자동 (영상 길이에 따라)" />
                </div>
                <div class="input-group">
                    <label for="custom-prompt">추가 지시사항 (선택)</label>
                    <textarea id="custom-prompt" rows="3" placeholder="예: 기술 용어는 영어로 유지해줘"></textarea>
                </div>
                <div class="input-group">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <label for="manual-transcript" style="margin:0;">📝 자막 직접 입력 (자동 추출 실패시)</label>
                        <button type="button" class="paste-btn" onclick="pasteFromClipboard()">📋 붙여넣기</button>
                    </div>
                    <textarea id="manual-transcript" rows="6" placeholder="자막을 여기에 붙여넣으세요&#10;&#10;💡 YouTube 스크립트 패널에서 HTML을 복사해서 붙여넣어도 자동 파싱됩니다!&#10;(개발자도구 → 스크립트 영역 우클릭 → Copy → Copy outerHTML)"></textarea>
                    <div class="bookmarklet-section">
                        <p style="margin: 10px 0 8px; color: #888; font-size: 0.85rem;">
                            👆 아래 버튼을 <b>북마크바에 드래그</b>하세요. 유튜브에서 클릭하면 자막이 복사됩니다!
                        </p>
                        <a href="javascript:(function(){const btn=document.querySelector('button[aria-label*=&quot;스크립트&quot;],button[aria-label*=&quot;transcript&quot;],ytd-menu-renderer button');if(btn)btn.click();setTimeout(()=>{const segments=document.querySelectorAll('ytd-transcript-segment-renderer,yt-formatted-string.segment-text');if(segments.length){let t='';segments.forEach(s=>{const time=s.querySelector('.segment-timestamp')?.textContent?.trim()||'';const text=s.querySelector('.segment-text')?.textContent?.trim()||s.textContent?.trim()||'';t+=(time?time+' ':'')+text+'\n';});navigator.clipboard.writeText(t).then(()=>alert('✅ 자막 복사 완료! ('+segments.length+'줄)\n\n챕터 생성기에 붙여넣으세요.')).catch(()=>{prompt('자막을 복사하세요:',t);});}else{const items=document.querySelectorAll('div.ytd-transcript-body-renderer');if(items.length){let t='';items.forEach(i=>t+=i.textContent?.trim()+'\n');navigator.clipboard.writeText(t).then(()=>alert('✅ 복사완료!')).catch(()=>prompt('복사:',t));}else{alert('❌ 자막을 찾을 수 없습니다.\n\n1. 영상 아래 ··· 클릭\n2. 스크립트 열기\n3. 다시 이 버튼 클릭');}}},1500);})()" class="bookmarklet-btn" onclick="event.preventDefault();alert('이 버튼을 북마크바에 드래그하세요!');">📋 YouTube 자막 복사</a>
                    </div>
                </div>
            </div>

            <div class="video-preview" id="video-preview"></div>

            <button id="generate-btn" onclick="generateChapters()">🚀 챕터 생성하기</button>
        </div>

        <div class="result-section" id="result-section">
            <div class="result-header">
                <h2>📋 생성된 챕터</h2>
                <button class="copy-btn" onclick="copyChapters()">📋 복사하기</button>
            </div>
            <div class="chapters-output" id="chapters-output"></div>
        </div>
    </div>

    <script>
        // Load saved API key
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini-api-key');
            if (savedKey) {
                document.getElementById('api-key').value = savedKey;
            }
        });

        // Save API key when changed
        document.getElementById('api-key').addEventListener('change', (e) => {
            localStorage.setItem('gemini-api-key', e.target.value);
        });

        // Show video preview when URL is entered
        document.getElementById('youtube-url').addEventListener('input', (e) => {
            const videoId = extractVideoId(e.target.value);
            const preview = document.getElementById('video-preview');
            
            if (videoId) {
                preview.innerHTML = `
                    <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg" 
                         onerror="this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg'" />
                `;
            } else {
                preview.innerHTML = '';
            }
        });

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function toggleApiKey() {
            const input = document.getElementById('api-key');
            const btn = document.querySelector('.toggle-btn');
            if (input.type === 'text') {
                input.type = 'password';
                btn.textContent = '보기';
            } else {
                input.type = 'text';
                btn.textContent = '숨기기';
            }
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('show');
        }

        async function generateChapters() {
            const url = document.getElementById('youtube-url').value.trim();
            const apiKey = document.getElementById('api-key').value.trim();
            const chapterCount = document.getElementById('chapter-count').value.trim();
            const customPrompt = document.getElementById('custom-prompt').value.trim();

            if (!url) {
                alert('YouTube URL을 입력해주세요');
                return;
            }

            if (!apiKey) {
                alert('Anthropic API Key를 입력해주세요');
                return;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                alert('올바른 YouTube URL이 아닙니다');
                return;
            }

            const btn = document.getElementById('generate-btn');
            const resultSection = document.getElementById('result-section');
            const output = document.getElementById('chapters-output');

            btn.disabled = true;
            btn.textContent = '⏳ 자막 가져오는 중...';
            resultSection.classList.remove('show');

            try {
                // Get transcript
                const transcript = await getTranscript(videoId);
                
                if (!transcript || transcript.length === 0) {
                    throw new Error('자막을 가져올 수 없습니다. 자막이 없는 영상이거나 비공개 영상일 수 있습니다.');
                }

                btn.textContent = '🤖 AI가 분석 중...';

                // Generate chapters with Gemini
                const chapters = await generateWithGemini(transcript, apiKey, chapterCount, customPrompt);

                output.textContent = chapters;
                resultSection.classList.add('show');

            } catch (error) {
                output.innerHTML = `<div class="error">❌ 오류: ${error.message}</div>
                <div style="margin-top:15px; color:#aaa; font-size:0.9rem;">
                    💡 <b>해결방법:</b> 고급 설정 → '자막 직접 입력'에 자막을 붙여넣으세요.<br>
                    YouTube에서: 영상 아래 ··· → '스크립트 열기' → 전체 복사
                </div>`;
                resultSection.classList.add('show');
                // Open settings panel to show manual input
                document.getElementById('settings-panel').classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 챕터 생성하기';
            }
        }

        async function getTranscript(videoId) {
            // Check if manual transcript is provided
            const manualTranscript = document.getElementById('manual-transcript').value.trim();
            if (manualTranscript) {
                return parseManualTranscript(manualTranscript);
            }

            // Method 0: Try local Python backend (best method - no CORS issues)
            try {
                console.log('Trying local backend...');
                const response = await fetch(`/api/transcript?videoId=${videoId}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0 && !data.error) {
                        console.log('Local backend succeeded!');
                        return data.map(item => ({
                            start: item.start,
                            text: item.text
                        }));
                    }
                }
            } catch (e) {
                console.log('Local backend not available:', e);
            }

            const corsProxies = [
                (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                (url) => `https://proxy.cors.sh/${url}`,
            ];

            // Method 1: Try yt-transcript-api
            try {
                console.log('Trying yt-transcript-api...');
                const response = await fetch(`https://yt-transcript-api.vercel.app/api/transcript?videoId=${videoId}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        console.log('yt-transcript-api succeeded!');
                        return data.map(item => ({
                            start: item.start || item.offset / 1000,
                            text: item.text
                        }));
                    }
                }
            } catch (e) {
                console.log('yt-transcript-api failed:', e);
            }

            // Method 2: Try tactiq transcript API
            try {
                console.log('Trying tactiq API...');
                const response = await fetch(`https://tactiq-apps-prod.tactiq.io/transcript?videoId=${videoId}&langCode=ko`);
                if (response.ok) {
                    const data = await response.json();
                    if (data?.captions?.length > 0) {
                        console.log('tactiq API succeeded!');
                        return data.captions.map(item => ({
                            start: item.start,
                            text: item.text
                        }));
                    }
                }
            } catch (e) {
                console.log('tactiq API failed:', e);
            }

            // Method 3: Try YouTube timedtext with multiple proxies
            const languages = ['ko', 'en', 'a.ko', 'a.en', 'ja', 'a.ja'];
            for (const proxy of corsProxies) {
                for (const lang of languages) {
                    try {
                        const apiUrl = `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${lang}&fmt=json3`;
                        const proxyUrl = proxy(apiUrl);
                        console.log(`Trying proxy for lang=${lang}:`, proxyUrl);
                        
                        const response = await fetch(proxyUrl, { 
                            headers: { 'Accept': 'application/json' },
                            timeout: 5000 
                        });
                        
                        if (response.ok) {
                            const text = await response.text();
                            if (text && text.startsWith('{')) {
                                const data = JSON.parse(text);
                                if (data?.events?.length > 0) {
                                    console.log(`Proxy succeeded for lang=${lang}!`);
                                    return data.events
                                        .filter(e => e.segs)
                                        .map(e => ({
                                            start: e.tStartMs / 1000,
                                            text: e.segs.map(s => s.utf8 || '').join('')
                                        }))
                                        .filter(e => e.text.trim());
                                }
                            }
                        }
                    } catch (e) {
                        console.log(`Proxy failed for lang=${lang}:`, e);
                    }
                }
            }

            // All methods failed - show manual input option
            throw new Error('자막 자동 추출 실패. 아래에 자막을 직접 붙여넣어주세요.');
        }

        function parseManualTranscript(text) {
            // Check if it's YouTube HTML (from inspect element or copy)
            if (text.includes('ytd-transcript-segment-renderer') || text.includes('segment-timestamp')) {
                return parseYouTubeHTML(text);
            }
            
            const lines = text.split('\n').filter(l => l.trim());
            const result = [];
            
            // Try to parse timestamps like "0:00" or "00:00:00" or "[0:00]"
            const timestampRegex = /\[?(\d{1,2}):(\d{2})(?::(\d{2}))?\]?\s*(.*)/;
            
            let currentTime = 0;
            for (const line of lines) {
                const match = line.match(timestampRegex);
                if (match) {
                    const hours = match[3] ? parseInt(match[1]) : 0;
                    const minutes = match[3] ? parseInt(match[2]) : parseInt(match[1]);
                    const seconds = match[3] ? parseInt(match[3]) : parseInt(match[2]);
                    currentTime = hours * 3600 + minutes * 60 + seconds;
                    const lineText = match[4] || line;
                    result.push({ start: currentTime, text: lineText.trim() });
                } else {
                    // No timestamp - use incremental time
                    result.push({ start: currentTime, text: line.trim() });
                    currentTime += 3; // Assume ~3 seconds per line
                }
            }
            
            return result;
        }

        function parseYouTubeHTML(html) {
            const result = [];
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Find all transcript segments
            const segments = doc.querySelectorAll('ytd-transcript-segment-renderer');
            
            segments.forEach(segment => {
                // Get timestamp
                const timestampEl = segment.querySelector('.segment-timestamp');
                const textEl = segment.querySelector('.segment-text, yt-formatted-string.segment-text');
                
                if (timestampEl && textEl) {
                    const timestampStr = timestampEl.textContent.trim();
                    const text = textEl.textContent.trim();
                    
                    // Parse timestamp (0:00 or 1:23 or 10:45)
                    const timeParts = timestampStr.split(':').map(p => parseInt(p.trim()));
                    let seconds = 0;
                    if (timeParts.length === 2) {
                        seconds = timeParts[0] * 60 + timeParts[1];
                    } else if (timeParts.length === 3) {
                        seconds = timeParts[0] * 3600 + timeParts[1] * 60 + timeParts[2];
                    }
                    
                    if (text) {
                        result.push({ start: seconds, text: text });
                    }
                }
            });
            
            console.log(`Parsed ${result.length} segments from YouTube HTML`);
            return result;
        }

        async function generateWithGemini(transcript, apiKey, chapterCount, customPrompt) {
            // Format transcript with timestamps
            const formattedTranscript = transcript.map(item => {
                const minutes = Math.floor(item.start / 60);
                const seconds = Math.floor(item.start % 60);
                const timestamp = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                return `[${timestamp}] ${item.text}`;
            }).join('\n');

            // Calculate video duration
            const lastItem = transcript[transcript.length - 1];
            const duration = lastItem ? Math.ceil(lastItem.start / 60) : 0;

            let chapterHint = '';
            if (chapterCount) {
                chapterHint = `대략 ${chapterCount}개의 챕터로 나눠줘.`;
            } else if (duration > 60) {
                chapterHint = '긴 영상이니 10-15개 정도의 챕터로 나눠줘.';
            } else if (duration > 30) {
                chapterHint = '7-10개 정도의 챕터로 나눠줘.';
            } else if (duration > 10) {
                chapterHint = '5-7개 정도의 챕터로 나눠줘.';
            } else {
                chapterHint = '3-5개 정도의 챕터로 나눠줘.';
            }

            const prompt = `너는 YouTube 영상 챕터를 생성하는 전문가야. 
영상 자막을 분석해서 주제가 바뀌는 지점을 찾아 챕터를 만들어줘.

규칙:
1. 첫 챕터는 반드시 0:00으로 시작해야 해 (YouTube 필수 조건)
2. 타임스탬프는 M:SS 또는 H:MM:SS 형식으로
3. 챕터 제목은 간결하고 내용을 잘 설명해야 해
4. 각 챕터는 최소 10초 이상 간격을 두고
5. 결과만 출력해 (설명 없이)

출력 형식:
0:00 인트로

                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'

                    contents: [{

                    }],
                    generationConfig: {
                        temperature: 0.3,
                        maxOutputTokens: 2000
                    }
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 호출 실패');
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;

        function copyChapters() {
            const output = document.getElementById('chapters-output').textContent;
            navigator.clipboard.writeText(output).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ 복사됨!';
                setTimeout(() => {
                    btn.textContent = '📋 복사하기';
                }, 2000);
            });
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('manual-transcript').value = text;
                
                // Show feedback with segment count if HTML
                const btn = document.querySelector('.paste-btn');
                const original = btn.textContent;
                
                if (text.includes('ytd-transcript-segment-renderer')) {
                    const parsed = parseYouTubeHTML(text);
                    btn.textContent = `✅ ${parsed.length}개 자막 감지!`;
                } else {
                    btn.textContent = '✅ 붙여넣기 완료!';
                }
                setTimeout(() => btn.textContent = original, 3000);
            } catch (e) {
                alert('클립보드 접근 권한이 필요합니다. 직접 Ctrl+V로 붙여넣어주세요.');
            }
        }
